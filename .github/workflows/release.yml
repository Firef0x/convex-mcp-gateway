name: Release

# Publishes the package to npm whenever a tag matching `v*` is pushed.
# Tags are produced by running `pnpm run release` (patch) or
# `pnpm run alpha` (prerelease) locally; that script bumps the version,
# commits, tags, and pushes.
#
# Authentication is via npm Trusted Publishing (OIDC), not NPM_TOKEN.
# On npmjs.com -> package settings -> Trusted Publisher, register:
#   provider:         GitHub Actions
#   organization:     tfohlmeister
#   repository:       convex-mcp-gateway
#   workflow filename: release.yml
# The `id-token: write` permission below lets npm verify the workflow
# is the one configured as the trusted publisher; `--provenance` is
# added automatically by `npm publish` under OIDC, but we set it
# explicitly to be unambiguous.
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Gated by the `release` environment: publishing requires manual
    # approval from a required reviewer, so a stray or malicious tag
    # push can't trigger an npm publish unattended.
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Node setup
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Lint
        run: pnpm run lint

      - name: Detect prerelease tag
        id: tag
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ -(alpha|beta|rc) ]]; then
            echo "tag=$(echo "$GITHUB_REF_NAME" | sed -E 's/.*-(alpha|beta|rc).*/\1/')" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        run: pnpm publish --no-git-checks --provenance --access public --tag ${{ steps.tag.outputs.tag }}
