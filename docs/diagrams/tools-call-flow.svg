<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720"
     font-family="'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.9" fill="rgba(11,13,11,0.10)"/>
    </pattern>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#52534e"/>
    </marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f7591f"/>
    </marker>
    <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a70c7"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#f5f4ed"/>
  <rect width="100%" height="100%" fill="url(#dots)" opacity="0.55"/>

  <!-- Lifelines (dashed verticals) -->
  <line x1="80"  y1="124" x2="80"  y2="608" stroke="rgba(11,13,11,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="240" y1="124" x2="240" y2="608" stroke="rgba(11,13,11,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="400" y1="124" x2="400" y2="608" stroke="rgba(11,13,11,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="560" y1="124" x2="560" y2="608" stroke="rgba(11,13,11,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="720" y1="124" x2="720" y2="608" stroke="rgba(11,13,11,0.20)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ARROWS (drawn before activation bars and labels for z-order) -->

  <!-- 1. C -> H: POST /mcp/ tools/call (HTTP, link blue) -->
  <line x1="80"  y1="160" x2="240" y2="160" stroke="#1a70c7" stroke-width="1.4" marker-end="url(#arrow-link)"/>

  <!-- 2. H self-loop: ctx.auth.getUserIdentity() -->
  <path d="M 240 196 C 280 196, 280 216, 240 216" fill="none" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 3. H -> D: lookup tool -->
  <line x1="240" y1="252" x2="560" y2="252" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 4. D -> H: tool record (dashed return) -->
  <line x1="560" y1="288" x2="240" y2="288" stroke="#52534e" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>

  <!-- 5. H -> Az: authorize (FOCAL CORAL) -->
  <line x1="240" y1="324" x2="400" y2="324" stroke="#f7591f" stroke-width="1.6" marker-end="url(#arrow-accent)"/>

  <!-- 6. Az -> H: {allowed: true} (dashed coral return) -->
  <line x1="400" y1="360" x2="240" y2="360" stroke="#f7591f" stroke-width="1.4" stroke-dasharray="5,4" marker-end="url(#arrow-accent)"/>

  <!-- 7. H -> D: runTool(name, args, auditIdentitySubject) -->
  <line x1="240" y1="396" x2="560" y2="396" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 8. D -> T: runQuery / runMutation / runAction -->
  <line x1="560" y1="432" x2="720" y2="432" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 9. T -> D: result (dashed return) -->
  <line x1="720" y1="468" x2="560" y2="468" stroke="#52534e" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>

  <!-- 10. D -> audit store (vertical down to small store icon) -->
  <line x1="560" y1="504" x2="560" y2="556" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 11. D -> H: {ok, data} (dashed return) -->
  <line x1="560" y1="540" x2="240" y2="540" stroke="#52534e" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>

  <!-- 12. H -> C: HTTP 200 + result (dashed link return) -->
  <line x1="240" y1="588" x2="80"  y2="588" stroke="#1a70c7" stroke-width="1.4" stroke-dasharray="5,4" marker-end="url(#arrow-link)"/>

  <!-- ACTIVATION BARS (after arrows so they sit on top of lifelines, under labels) -->
  <!-- H lifeline activation: from msg 1 to msg 12 (whole flow) -->
  <rect x="236" y="160" width="8" height="428" fill="rgba(11,13,11,0.06)" stroke="#52534e" stroke-width="0.8"/>
  <!-- Az activation: msg 5 to msg 6 -->
  <rect x="396" y="324" width="8" height="36"  fill="rgba(247,89,31,0.10)" stroke="#f7591f" stroke-width="0.8"/>
  <!-- D activation: msg 3 to msg 11 -->
  <rect x="556" y="252" width="8" height="288" fill="rgba(11,13,11,0.06)" stroke="#52534e" stroke-width="0.8"/>
  <!-- T activation: msg 8 to msg 9 -->
  <rect x="716" y="432" width="8" height="36"  fill="rgba(11,13,11,0.06)" stroke="#52534e" stroke-width="0.8"/>

  <!-- ARROW LABELS (with opaque paper masks) -->

  <!-- 1. POST tools/call -->
  <rect x="100" y="144" width="120" height="12" rx="2" fill="#f5f4ed"/>
  <text x="160" y="154" fill="#1a70c7" font-size="8" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle" letter-spacing="0.06em">POST tools/call name=X</text>

  <!-- 2. self-loop label -->
  <rect x="252" y="200" width="116" height="12" rx="2" fill="#f5f4ed"/>
  <text x="310" y="210" fill="#52534e" font-size="8" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle" letter-spacing="0.06em">ctx.auth.getUserIdentity</text>

  <!-- 3. lookup tool -->
  <rect x="340" y="236" width="120" height="12" rx="2" fill="#f5f4ed"/>
  <text x="400" y="246" fill="#52534e" font-size="8" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle" letter-spacing="0.06em">registry.getTool(name)</text>

  <!-- 4. tool record (return) -->
  <rect x="356" y="272" width="88" height="12" rx="2" fill="#f5f4ed"/>
  <text x="400" y="282" fill="#52534e" font-size="8" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle" letter-spacing="0.06em">tool record</text>

  <!-- 5. authorize (FOCAL) -->
  <rect x="260" y="308" width="120" height="12" rx="2" fill="#f5f4ed"/>
  <text x="320" y="318" fill="#f7591f" font-size="8" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle" letter-spacing="0.08em">AUTHORIZE mode=call</text>

  <!-- 6. allowed:true return -->
  <rect x="276" y="344" width="88" height="12" rx="2" fill="#f5f4ed"/>
  <text x="320" y="354" fill="#f7591f" font-size="8" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle" letter-spacing="0.06em">{allowed:true}</text>

  <!-- 7. runTool -->
  <rect x="320" y="380" width="160" height="12" rx="2" fill="#f5f4ed"/>
  <text x="400" y="390" fill="#52534e" font-size="8" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle" letter-spacing="0.06em">runTool(args, identitySubject)</text>

  <!-- 8. runQuery / runMutation / runAction -->
  <rect x="580" y="416" width="120" height="12" rx="2" fill="#f5f4ed"/>
  <text x="640" y="426" fill="#52534e" font-size="8" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle" letter-spacing="0.06em">runQuery / Mutation</text>

  <!-- 9. result return -->
  <rect x="608" y="452" width="64" height="12" rx="2" fill="#f5f4ed"/>
  <text x="640" y="462" fill="#52534e" font-size="8" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle" letter-spacing="0.06em">result</text>

  <!-- 10. audit write label (placed to the right of vertical arrow) -->
  <rect x="568" y="520" width="128" height="12" rx="2" fill="#f5f4ed"/>
  <text x="632" y="530" fill="#52534e" font-size="8" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="start" letter-spacing="0.08em">WRITE outcome=allowed</text>

  <!-- 11. {ok, data} return -->
  <rect x="356" y="524" width="88" height="12" rx="2" fill="#f5f4ed"/>
  <text x="400" y="534" fill="#52534e" font-size="8" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle" letter-spacing="0.06em">{ok, data}</text>

  <!-- 12. HTTP 200 + result -->
  <rect x="100" y="572" width="120" height="12" rx="2" fill="#f5f4ed"/>
  <text x="160" y="582" fill="#1a70c7" font-size="8" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle" letter-spacing="0.06em">HTTP 200 + result</text>

  <!-- LIFELINE HEADERS (drawn after arrows so they're on top) -->

  <!-- C: MCP Client (External, muted) -->
  <rect x="20" y="60" width="120" height="64" rx="6" fill="#f5f4ed"/>
  <rect x="20" y="60" width="120" height="64" rx="6" fill="rgba(82,83,78,0.10)" stroke="#65655c" stroke-width="1"/>
  <rect x="28" y="68" width="32" height="12" rx="2" fill="transparent" stroke="rgba(101,101,92,0.40)" stroke-width="0.8"/>
  <text x="44" y="77" fill="#65655c" font-size="7" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle" letter-spacing="0.08em">EXT</text>
  <text x="80" y="100" fill="#0b0d0b" font-size="12" font-weight="600" text-anchor="middle">MCP Client</text>
  <text x="80" y="116" fill="#52534e" font-size="9" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle">claude · cursor</text>

  <!-- H: /mcp/ httpAction (host) -->
  <rect x="180" y="60" width="120" height="64" rx="6" fill="#f5f4ed"/>
  <rect x="180" y="60" width="120" height="64" rx="6" fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>
  <rect x="188" y="68" width="36" height="12" rx="2" fill="transparent" stroke="rgba(11,13,11,0.40)" stroke-width="0.8"/>
  <text x="206" y="77" fill="#0b0d0b" font-size="7" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle" letter-spacing="0.08em">HOST</text>
  <text x="240" y="100" fill="#0b0d0b" font-size="12" font-weight="600" text-anchor="middle">/mcp/ httpAction</text>
  <text x="240" y="116" fill="#52534e" font-size="9" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle">handleMcpRequest</text>

  <!-- Az: authorize callback (FOCAL CORAL) -->
  <rect x="340" y="60" width="120" height="64" rx="6" fill="#f5f4ed"/>
  <rect x="340" y="60" width="120" height="64" rx="6" fill="rgba(247,89,31,0.08)" stroke="#f7591f" stroke-width="1.2"/>
  <rect x="348" y="68" width="36" height="12" rx="2" fill="transparent" stroke="rgba(247,89,31,0.50)" stroke-width="0.8"/>
  <text x="366" y="77" fill="#f7591f" font-size="7" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle" letter-spacing="0.08em">HOST</text>
  <text x="400" y="100" fill="#0b0d0b" font-size="12" font-weight="600" text-anchor="middle">authorize</text>
  <text x="400" y="116" fill="#52534e" font-size="9" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle">policy boundary</text>

  <!-- D: dispatch.runTool (component) -->
  <rect x="500" y="60" width="120" height="64" rx="6" fill="#f5f4ed"/>
  <rect x="500" y="60" width="120" height="64" rx="6" fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>
  <rect x="508" y="68" width="36" height="12" rx="2" fill="transparent" stroke="rgba(11,13,11,0.40)" stroke-width="0.8"/>
  <text x="526" y="77" fill="#0b0d0b" font-size="7" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle" letter-spacing="0.08em">CORE</text>
  <text x="560" y="100" fill="#0b0d0b" font-size="12" font-weight="600" text-anchor="middle">dispatch.runTool</text>
  <text x="560" y="116" fill="#52534e" font-size="9" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle">component</text>

  <!-- T: Host tool fn -->
  <rect x="660" y="60" width="120" height="64" rx="6" fill="#f5f4ed"/>
  <rect x="660" y="60" width="120" height="64" rx="6" fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>
  <rect x="668" y="68" width="36" height="12" rx="2" fill="transparent" stroke="rgba(11,13,11,0.40)" stroke-width="0.8"/>
  <text x="686" y="77" fill="#0b0d0b" font-size="7" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle" letter-spacing="0.08em">HOST</text>
  <text x="720" y="100" fill="#0b0d0b" font-size="12" font-weight="600" text-anchor="middle">Host tool fn</text>
  <text x="720" y="116" fill="#52534e" font-size="9" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle">query · mutation · action</text>

  <!-- AUDIT STORE icon at bottom of D lifeline -->
  <rect x="500" y="556" width="120" height="44" rx="6" fill="#f5f4ed"/>
  <rect x="500" y="556" width="120" height="44" rx="6" fill="rgba(11,13,11,0.05)" stroke="#52534e" stroke-width="1"/>
  <rect x="508" y="564" width="44" height="12" rx="2" fill="transparent" stroke="rgba(82,83,78,0.50)" stroke-width="0.8"/>
  <text x="530" y="573" fill="#52534e" font-size="7" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle" letter-spacing="0.08em">STORE</text>
  <text x="560" y="592" fill="#0b0d0b" font-size="11" font-weight="600" text-anchor="middle">audit log</text>

  <!-- RIGHT-MARGIN FAILURE NOTES (italic editorial asides) -->
  <line x1="820" y1="156" x2="820" y2="540" stroke="rgba(11,13,11,0.10)" stroke-width="0.8" stroke-dasharray="3,3"/>

  <text x="836" y="148" fill="#52534e" font-size="8" font-family="'Geist Mono', ui-monospace, monospace"
        letter-spacing="0.14em">FAILURE BRANCHES</text>

  <!-- Note 1: tool unknown -->
  <circle cx="836" cy="180" r="3" fill="#52534e"/>
  <text x="848" y="184" fill="#0b0d0b" font-size="10" font-weight="600">tool unknown</text>
  <text x="848" y="200" fill="#52534e" font-size="9" font-family="'Geist Mono', ui-monospace, monospace">→ -32602 (no audit)</text>

  <!-- Note 2: authorize throws -->
  <circle cx="836" cy="232" r="3" fill="#f7591f"/>
  <text x="848" y="236" fill="#0b0d0b" font-size="10" font-weight="600">authorize throws</text>
  <text x="848" y="252" fill="#52534e" font-size="9" font-family="'Geist Mono', ui-monospace, monospace">→ -32603 + audit error</text>

  <!-- Note 3: allowed false -->
  <circle cx="836" cy="284" r="3" fill="#f7591f"/>
  <text x="848" y="288" fill="#0b0d0b" font-size="10" font-weight="600">allowed = false</text>
  <text x="848" y="304" fill="#52534e" font-size="9" font-family="'Geist Mono', ui-monospace, monospace">→ -32001 / -32003</text>
  <text x="848" y="316" fill="#52534e" font-size="9" font-family="'Geist Mono', ui-monospace, monospace">+ audit denied</text>

  <!-- Note 4: tool throws -->
  <circle cx="836" cy="348" r="3" fill="#52534e"/>
  <text x="848" y="352" fill="#0b0d0b" font-size="10" font-weight="600">tool throws</text>
  <text x="848" y="368" fill="#52534e" font-size="9" font-family="'Geist Mono', ui-monospace, monospace">→ -32000 + audit error</text>

  <!-- Editorial aside -->
  <text x="836" y="416" fill="#52534e" font-size="11" font-style="italic" font-family="'Instrument Serif', Georgia, serif">
    <tspan x="836" dy="0">Every outcome except</tspan>
    <tspan x="836" dy="16">"unknown tool" lands</tspan>
    <tspan x="836" dy="16">in the audit log.</tspan>
  </text>

  <!-- LEGEND STRIP -->
  <line x1="40" y1="652" x2="1040" y2="652" stroke="rgba(11,13,11,0.10)" stroke-width="0.8"/>
  <text x="40" y="668" fill="#52534e" font-size="8" font-family="'Geist Mono', ui-monospace, monospace"
        letter-spacing="0.14em">LEGEND</text>

  <rect x="40" y="684" width="14" height="10" rx="2" fill="rgba(247,89,31,0.08)" stroke="#f7591f" stroke-width="1"/>
  <text x="60" y="692" fill="#52534e" font-size="9">authorize callback (focal)</text>

  <rect x="240" y="684" width="14" height="10" rx="2" fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>
  <text x="260" y="692" fill="#52534e" font-size="9">Host · component</text>

  <rect x="392" y="684" width="14" height="10" rx="2" fill="rgba(82,83,78,0.10)" stroke="#65655c" stroke-width="1"/>
  <text x="412" y="692" fill="#52534e" font-size="9">External</text>

  <line x1="500" y1="690" x2="528" y2="690" stroke="#1a70c7" stroke-width="1.4" marker-end="url(#arrow-link)"/>
  <text x="536" y="692" fill="#52534e" font-size="9">HTTP</text>

  <line x1="600" y1="690" x2="628" y2="690" stroke="#f7591f" stroke-width="1.6" marker-end="url(#arrow-accent)"/>
  <text x="636" y="692" fill="#52534e" font-size="9">Policy decision</text>

  <line x1="744" y1="690" x2="772" y2="690" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="780" y="692" fill="#52534e" font-size="9">Internal call</text>

  <line x1="864" y1="690" x2="892" y2="690" stroke="#52534e" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="900" y="692" fill="#52534e" font-size="9">Return</text>
</svg>
