<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 580"
     font-family="'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.9" fill="rgba(11,13,11,0.10)"/>
    </pattern>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#52534e"/>
    </marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f7591f"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#f5f4ed"/>
  <rect width="100%" height="100%" fill="url(#dots)" opacity="0.55"/>

  <!-- ================= TITLE ================= -->
  <text x="40" y="44" fill="#0b0d0b" font-size="16" font-weight="600">requireAuth: triggering OAuth on an all-private server</text>
  <text x="40" y="64" fill="#52534e" font-size="11"
        font-family="'Geist Mono', ui-monospace, monospace">A browser MCP client (claude.ai) only starts OAuth on a 401. With no public tools, the default 200-empty list never triggers it.</text>

  <!-- ================= DIVIDER ================= -->
  <line x1="540" y1="96" x2="540" y2="486"
        stroke="rgba(11,13,11,0.14)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ================= PANEL EYEBROWS ================= -->
  <text x="130" y="92" fill="#52534e" font-size="9"
        font-family="'Geist Mono', ui-monospace, monospace" letter-spacing="0.14em">DEFAULT &#183; UNREACHABLE BY claude.ai</text>
  <text x="630" y="92" fill="#f7591f" font-size="9"
        font-family="'Geist Mono', ui-monospace, monospace" letter-spacing="0.14em">requireAuth: true &#183; OAUTH TRIGGERED</text>

  <!-- ================= ARROWS (drawn before boxes) ================= -->
  <!-- LEFT cx=290 -->
  <line x1="290" y1="172" x2="290" y2="194" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="290" y1="248" x2="290" y2="270" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="290" y1="324" x2="290" y2="346" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- RIGHT cx=790 -->
  <line x1="790" y1="172" x2="790" y2="194" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="790" y1="248" x2="790" y2="270" stroke="#f7591f" stroke-width="1.6" marker-end="url(#arrow-accent)"/>
  <line x1="790" y1="324" x2="790" y2="346" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ================= LEFT PANEL BOXES ================= -->
  <!-- box1 -->
  <rect x="130" y="120" width="320" height="52" rx="6" fill="#ffffff" stroke="#65655c" stroke-width="1"/>
  <text x="290" y="142" fill="#0b0d0b" font-size="12" font-weight="600" text-anchor="middle">claude.ai adds the connector</text>
  <text x="290" y="159" fill="#52534e" font-size="9" font-family="'Geist Mono', ui-monospace, monospace" text-anchor="middle">does initialize + tools/list, then stops</text>

  <!-- box2 -->
  <rect x="130" y="196" width="320" height="52" rx="6" fill="#ffffff" stroke="#65655c" stroke-width="1"/>
  <text x="290" y="218" fill="#0b0d0b" font-size="11" font-family="'Geist Mono', ui-monospace, monospace" text-anchor="middle">POST initialize</text>
  <text x="290" y="235" fill="#52534e" font-size="9" font-family="'Geist Mono', ui-monospace, monospace" text-anchor="middle">&#8594; 200 OK</text>

  <!-- box3 -->
  <rect x="130" y="272" width="320" height="52" rx="6" fill="#ffffff" stroke="#65655c" stroke-width="1"/>
  <text x="290" y="294" fill="#0b0d0b" font-size="11" font-family="'Geist Mono', ui-monospace, monospace" text-anchor="middle">POST tools/list</text>
  <text x="290" y="311" fill="#52534e" font-size="9" font-family="'Geist Mono', ui-monospace, monospace" text-anchor="middle">&#8594; 200  { tools: [] }   (all private, filtered)</text>

  <!-- box4 dead end -->
  <rect x="130" y="348" width="320" height="56" rx="6" fill="rgba(82,83,78,0.08)" stroke="#65655c" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="290" y="370" fill="#52534e" font-size="12" font-weight="600" text-anchor="middle">&#10005;  no 401 is ever returned</text>
  <text x="290" y="388" fill="#52534e" font-size="9" font-family="'Geist Mono', ui-monospace, monospace" text-anchor="middle">OAuth never starts, client shows</text>
  <text x="290" y="399" fill="#52534e" font-size="9" font-family="'Geist Mono', ui-monospace, monospace" text-anchor="middle">"connected, no tools": dead end</text>

  <!-- ================= RIGHT PANEL BOXES ================= -->
  <!-- box1 -->
  <rect x="630" y="120" width="320" height="52" rx="6" fill="#ffffff" stroke="#65655c" stroke-width="1"/>
  <text x="790" y="142" fill="#0b0d0b" font-size="12" font-weight="600" text-anchor="middle">claude.ai adds the connector</text>
  <text x="790" y="159" fill="#52534e" font-size="9" font-family="'Geist Mono', ui-monospace, monospace" text-anchor="middle">does initialize + tools/list, then stops</text>

  <!-- box2 focal: 401 challenge -->
  <rect x="630" y="196" width="320" height="52" rx="6" fill="rgba(247,89,31,0.08)" stroke="#f7591f" stroke-width="1.4"/>
  <text x="790" y="218" fill="#0b0d0b" font-size="11" font-family="'Geist Mono', ui-monospace, monospace" text-anchor="middle">POST initialize  (no Bearer)</text>
  <text x="790" y="235" fill="#f7591f" font-size="9" font-family="'Geist Mono', ui-monospace, monospace" text-anchor="middle">&#8594; 401 + WWW-Authenticate</text>

  <!-- box3 -->
  <rect x="630" y="272" width="320" height="52" rx="6" fill="#ffffff" stroke="#65655c" stroke-width="1"/>
  <text x="790" y="294" fill="#0b0d0b" font-size="11" font-family="'Geist Mono', ui-monospace, monospace" text-anchor="middle">OAuth discovery + login</text>
  <text x="790" y="311" fill="#52534e" font-size="9" font-family="'Geist Mono', ui-monospace, monospace" text-anchor="middle">&#8594; access_token  (see oauth-flow)</text>

  <!-- box4 success -->
  <rect x="630" y="348" width="320" height="56" rx="6" fill="#ffffff" stroke="#0b0d0b" stroke-width="1.2"/>
  <text x="790" y="372" fill="#0b0d0b" font-size="12" font-weight="600" text-anchor="middle">&#10003;  retried with Bearer</text>
  <text x="790" y="390" fill="#52534e" font-size="9" font-family="'Geist Mono', ui-monospace, monospace" text-anchor="middle">initialize &#8594; 200 &#183; tools/list &#8594; tools</text>

  <!-- ================= CALLOUT: needs OAuth config ================= -->
  <rect x="630" y="430" width="410" height="22" rx="3" fill="#f5f4ed" stroke="rgba(11,13,11,0.18)" stroke-width="0.8"/>
  <text x="642" y="445" fill="#52534e" font-size="9" font-family="'Geist Mono', ui-monospace, monospace">setOAuthConfig supplies the header; without it the 401 still fires</text>

  <!-- ================= LEGEND ================= -->
  <line x1="40" y1="500" x2="1040" y2="500" stroke="rgba(11,13,11,0.10)" stroke-width="0.8"/>
  <text x="40" y="518" fill="#52534e" font-size="8" font-family="'Geist Mono', ui-monospace, monospace" letter-spacing="1.5">LEGEND</text>

  <rect x="40" y="532" width="14" height="10" rx="2" fill="rgba(247,89,31,0.08)" stroke="#f7591f" stroke-width="1.2"/>
  <text x="60" y="541" fill="#52534e" font-size="9">401 challenge (focal trigger)</text>

  <rect x="248" y="532" width="14" height="10" rx="2" fill="#ffffff" stroke="#0b0d0b" stroke-width="1.2"/>
  <text x="268" y="541" fill="#52534e" font-size="9">success</text>

  <rect x="364" y="532" width="14" height="10" rx="2" fill="rgba(82,83,78,0.08)" stroke="#65655c" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="384" y="541" fill="#52534e" font-size="9">dead end (no trigger)</text>

  <line x1="556" y1="538" x2="584" y2="538" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="592" y="541" fill="#52534e" font-size="9">step sequence</text>
</svg>
