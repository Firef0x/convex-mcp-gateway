<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 560"
     font-family="'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.9" fill="rgba(11,13,11,0.10)"/>
    </pattern>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#52534e"/>
    </marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f7591f"/>
    </marker>
    <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a70c7"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#f5f4ed"/>
  <rect width="100%" height="100%" fill="url(#dots)" opacity="0.55"/>

  <!-- Lifelines -->
  <line x1="80"  y1="124" x2="80"  y2="448" stroke="rgba(11,13,11,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="280" y1="124" x2="280" y2="448" stroke="rgba(11,13,11,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="520" y1="124" x2="520" y2="448" stroke="rgba(11,13,11,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="760" y1="124" x2="760" y2="448" stroke="rgba(11,13,11,0.20)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- PAR BLOCK FRAME (drawn first so it sits behind arrows + activations) -->
  <rect x="260" y="244" width="540" height="132" rx="4" fill="rgba(247,89,31,0.04)"
        stroke="rgba(247,89,31,0.45)" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- par tag -->
  <rect x="268" y="232" width="92" height="20" rx="2" fill="#f5f4ed"/>
  <rect x="268" y="232" width="92" height="20" rx="2" fill="rgba(247,89,31,0.10)"
        stroke="#f7591f" stroke-width="1"/>
  <text x="278" y="246" fill="#f7591f" font-size="9" font-weight="600"
        font-family="'Geist Mono', ui-monospace, monospace" letter-spacing="0.12em">par × N tools</text>

  <!-- ARROWS (drawn before activation bars) -->

  <!-- 1. C -> H: POST tools/list (HTTP link blue) -->
  <line x1="80"  y1="160" x2="280" y2="160" stroke="#1a70c7" stroke-width="1.4" marker-end="url(#arrow-link)"/>

  <!-- 2. H -> R: listTools() -->
  <line x1="280" y1="200" x2="520" y2="200" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 3. R -> H: all registered tools (dashed return) -->
  <line x1="520" y1="232" x2="280" y2="232" stroke="#52534e" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>

  <!-- 4. Three parallel authorize calls H -> Az (coral) -->
  <line x1="280" y1="276" x2="760" y2="276" stroke="#f7591f" stroke-width="1.6" marker-end="url(#arrow-accent)"/>
  <line x1="280" y1="296" x2="760" y2="296" stroke="#f7591f" stroke-width="1.6" marker-end="url(#arrow-accent)"/>
  <line x1="280" y1="316" x2="760" y2="316" stroke="#f7591f" stroke-width="1.6" marker-end="url(#arrow-accent)"/>

  <!-- 5. Az -> H: filtered list (dashed coral return, batched) -->
  <line x1="760" y1="356" x2="280" y2="356" stroke="#f7591f" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#arrow-accent)"/>

  <!-- 6. H -> C: tools array (dashed link return) -->
  <line x1="280" y1="424" x2="80"  y2="424" stroke="#1a70c7" stroke-width="1.4" stroke-dasharray="5,4" marker-end="url(#arrow-link)"/>

  <!-- ACTIVATION BARS -->
  <!-- H: 1 to 6 -->
  <rect x="276" y="160" width="8" height="264" fill="rgba(11,13,11,0.06)" stroke="#52534e" stroke-width="0.8"/>
  <!-- R: 2 to 3 -->
  <rect x="516" y="200" width="8" height="32"  fill="rgba(11,13,11,0.06)" stroke="#52534e" stroke-width="0.8"/>
  <!-- Az: thick activation across the par block (276 -> 356) -->
  <rect x="752" y="276" width="16" height="80" fill="rgba(247,89,31,0.12)" stroke="#f7591f" stroke-width="0.8"/>

  <!-- ARROW LABELS -->

  <!-- 1. POST tools/list -->
  <rect x="120" y="144" width="120" height="12" rx="2" fill="#f5f4ed"/>
  <text x="180" y="154" fill="#1a70c7" font-size="8" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle" letter-spacing="0.06em">POST tools/list</text>

  <!-- 2. listTools() -->
  <rect x="340" y="184" width="120" height="12" rx="2" fill="#f5f4ed"/>
  <text x="400" y="194" fill="#52534e" font-size="8" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle" letter-spacing="0.06em">registry.listTools()</text>

  <!-- 3. all registered tools (return) -->
  <rect x="332" y="216" width="136" height="12" rx="2" fill="#f5f4ed"/>
  <text x="400" y="226" fill="#52534e" font-size="8" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle" letter-spacing="0.06em">all registered tools</text>

  <!-- 4. authorize mode=list (one label spanning the parallel arrows) -->
  <rect x="440" y="260" width="160" height="12" rx="2" fill="#f5f4ed"/>
  <text x="520" y="270" fill="#f7591f" font-size="8" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle" letter-spacing="0.08em">AUTHORIZE mode=list</text>

  <!-- 5. filtered list (return) -->
  <rect x="436" y="340" width="168" height="12" rx="2" fill="#f5f4ed"/>
  <text x="520" y="350" fill="#f7591f" font-size="8" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle" letter-spacing="0.06em">filtered allowed list</text>

  <!-- 6. tools array (return to client) -->
  <rect x="120" y="408" width="120" height="12" rx="2" fill="#f5f4ed"/>
  <text x="180" y="418" fill="#1a70c7" font-size="8" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle" letter-spacing="0.06em">{tools: [allowed]}</text>

  <!-- LIFELINE HEADERS -->

  <!-- C: MCP Client -->
  <rect x="20" y="60" width="120" height="64" rx="6" fill="#f5f4ed"/>
  <rect x="20" y="60" width="120" height="64" rx="6" fill="rgba(82,83,78,0.10)" stroke="#65655c" stroke-width="1"/>
  <rect x="28" y="68" width="32" height="12" rx="2" fill="transparent" stroke="rgba(101,101,92,0.40)" stroke-width="0.8"/>
  <text x="44" y="77" fill="#65655c" font-size="7" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle" letter-spacing="0.08em">EXT</text>
  <text x="80" y="100" fill="#0b0d0b" font-size="12" font-weight="600" text-anchor="middle">MCP Client</text>
  <text x="80" y="116" fill="#52534e" font-size="9" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle">any MCP client</text>

  <!-- H: /mcp/ httpAction -->
  <rect x="220" y="60" width="120" height="64" rx="6" fill="#f5f4ed"/>
  <rect x="220" y="60" width="120" height="64" rx="6" fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>
  <rect x="228" y="68" width="36" height="12" rx="2" fill="transparent" stroke="rgba(11,13,11,0.40)" stroke-width="0.8"/>
  <text x="246" y="77" fill="#0b0d0b" font-size="7" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle" letter-spacing="0.08em">HOST</text>
  <text x="280" y="100" fill="#0b0d0b" font-size="12" font-weight="600" text-anchor="middle">/mcp/ httpAction</text>
  <text x="280" y="116" fill="#52534e" font-size="9" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle">handleMcpRequest</text>

  <!-- R: registry.listTools (component) -->
  <rect x="460" y="60" width="120" height="64" rx="6" fill="#f5f4ed"/>
  <rect x="460" y="60" width="120" height="64" rx="6" fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>
  <rect x="468" y="68" width="36" height="12" rx="2" fill="transparent" stroke="rgba(11,13,11,0.40)" stroke-width="0.8"/>
  <text x="486" y="77" fill="#0b0d0b" font-size="7" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle" letter-spacing="0.08em">CORE</text>
  <text x="520" y="100" fill="#0b0d0b" font-size="12" font-weight="600" text-anchor="middle">registry.listTools</text>
  <text x="520" y="116" fill="#52534e" font-size="9" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle">component</text>

  <!-- Az: authorize (FOCAL) -->
  <rect x="700" y="60" width="120" height="64" rx="6" fill="#f5f4ed"/>
  <rect x="700" y="60" width="120" height="64" rx="6" fill="rgba(247,89,31,0.08)" stroke="#f7591f" stroke-width="1.2"/>
  <rect x="708" y="68" width="36" height="12" rx="2" fill="transparent" stroke="rgba(247,89,31,0.50)" stroke-width="0.8"/>
  <text x="726" y="77" fill="#f7591f" font-size="7" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle" letter-spacing="0.08em">HOST</text>
  <text x="760" y="100" fill="#0b0d0b" font-size="12" font-weight="600" text-anchor="middle">authorize</text>
  <text x="760" y="116" fill="#52534e" font-size="9" font-family="'Geist Mono', ui-monospace, monospace"
        text-anchor="middle">policy boundary</text>

  <!-- Editorial aside -->
  <text x="840" y="284" fill="#52534e" font-size="11" font-style="italic"
        font-family="'Instrument Serif', Georgia, serif">
    <tspan x="840" dy="0">authorize is invoked</tspan>
    <tspan x="840" dy="16">once per registered</tspan>
    <tspan x="840" dy="16">tool, all in parallel.</tspan>
    <tspan x="840" dy="16">Tools that throw or</tspan>
    <tspan x="840" dy="16">return false are</tspan>
    <tspan x="840" dy="16">silently dropped.</tspan>
  </text>

  <!-- LEGEND STRIP -->
  <line x1="40" y1="488" x2="1040" y2="488" stroke="rgba(11,13,11,0.10)" stroke-width="0.8"/>
  <text x="40" y="504" fill="#52534e" font-size="8" font-family="'Geist Mono', ui-monospace, monospace"
        letter-spacing="0.14em">LEGEND</text>

  <rect x="40" y="520" width="14" height="10" rx="2" fill="rgba(247,89,31,0.08)" stroke="#f7591f" stroke-width="1"/>
  <text x="60" y="528" fill="#52534e" font-size="9">authorize callback (focal)</text>

  <rect x="240" y="520" width="14" height="10" rx="2" fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>
  <text x="260" y="528" fill="#52534e" font-size="9">Host · component</text>

  <rect x="392" y="520" width="14" height="10" rx="2" fill="rgba(82,83,78,0.10)" stroke="#65655c" stroke-width="1"/>
  <text x="412" y="528" fill="#52534e" font-size="9">External</text>

  <line x1="500" y1="526" x2="528" y2="526" stroke="#1a70c7" stroke-width="1.4" marker-end="url(#arrow-link)"/>
  <text x="536" y="528" fill="#52534e" font-size="9">HTTP</text>

  <line x1="600" y1="526" x2="628" y2="526" stroke="#f7591f" stroke-width="1.6" marker-end="url(#arrow-accent)"/>
  <text x="636" y="528" fill="#52534e" font-size="9">Policy decision</text>

  <line x1="744" y1="526" x2="772" y2="526" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="780" y="528" fill="#52534e" font-size="9">Internal call</text>

  <line x1="864" y1="526" x2="892" y2="526" stroke="#52534e" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="900" y="528" fill="#52534e" font-size="9">Return</text>
</svg>
