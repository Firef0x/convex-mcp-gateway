<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.9" fill="rgba(11,13,11,0.10)"/>
    </pattern>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#52534e"/>
    </marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f7591f"/>
    </marker>
    <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a70c7"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#f5f4ed"/>
  <rect width="100%" height="100%" fill="url(#dots)" opacity="0.55"/>

  <!-- ============================== -->
  <!-- LIFELINES (drawn first)         -->
  <!-- ============================== -->
  <!-- C @ x=140, G @ x=420, W @ x=680, AS @ x=940 -->
  <line x1="140" y1="120" x2="140" y2="492"
        stroke="rgba(11,13,11,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="420" y1="120" x2="420" y2="492"
        stroke="rgba(11,13,11,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="680" y1="120" x2="680" y2="492"
        stroke="rgba(11,13,11,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="940" y1="120" x2="940" y2="492"
        stroke="rgba(11,13,11,0.20)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ============================== -->
  <!-- MESSAGES (arrows before nodes)  -->
  <!-- ============================== -->

  <!-- 1. C -> G: POST /mcp/ tools/call (no Bearer) -->
  <line x1="144" y1="160" x2="416" y2="160"
        stroke="#1a70c7" stroke-width="1.4" marker-end="url(#arrow-link)"/>

  <!-- 2. G -> C: 401 + WWW-Authenticate (dashed return, link-blue) -->
  <line x1="416" y1="208" x2="144" y2="208"
        stroke="#1a70c7" stroke-width="1.2" stroke-dasharray="5,4"
        marker-end="url(#arrow-link)"/>

  <!-- 3. C -> W: GET /.well-known/... -->
  <line x1="144" y1="256" x2="676" y2="256"
        stroke="#1a70c7" stroke-width="1.4" marker-end="url(#arrow-link)"/>

  <!-- 4. W -> C: resource metadata (dashed) -->
  <line x1="676" y1="296" x2="144" y2="296"
        stroke="#1a70c7" stroke-width="1.2" stroke-dasharray="5,4"
        marker-end="url(#arrow-link)"/>

  <!-- 5. C -> AS: OAuth 2.1 flow (FOCAL coral) -->
  <line x1="144" y1="344" x2="936" y2="344"
        stroke="#f7591f" stroke-width="1.6" marker-end="url(#arrow-accent)"/>

  <!-- 6. AS -> C: access_token (dashed coral return) -->
  <line x1="936" y1="384" x2="144" y2="384"
        stroke="#f7591f" stroke-width="1.4" stroke-dasharray="5,4"
        marker-end="url(#arrow-accent)"/>

  <!-- 7. C -> G: tools/call with Bearer -->
  <line x1="144" y1="432" x2="416" y2="432"
        stroke="#1a70c7" stroke-width="1.4" marker-end="url(#arrow-link)"/>

  <!-- 8. G -> C: 200 result (dashed) -->
  <line x1="416" y1="472" x2="144" y2="472"
        stroke="#1a70c7" stroke-width="1.2" stroke-dasharray="5,4"
        marker-end="url(#arrow-link)"/>

  <!-- ============================== -->
  <!-- ACTIVATION BARS                 -->
  <!-- ============================== -->
  <!-- Gateway active: msg 1 -> msg 2 -->
  <rect x="416" y="160" width="8" height="48"
        fill="rgba(11,13,11,0.06)" stroke="#52534e" stroke-width="0.8"/>
  <!-- Discovery active: msg 3 -> msg 4 -->
  <rect x="676" y="256" width="8" height="40"
        fill="rgba(11,13,11,0.06)" stroke="#52534e" stroke-width="0.8"/>
  <!-- AS active: msg 5 -> msg 6 -->
  <rect x="936" y="344" width="8" height="40"
        fill="rgba(247,89,31,0.10)" stroke="#f7591f" stroke-width="0.8"/>
  <!-- Gateway active again: msg 7 -> msg 8 -->
  <rect x="416" y="432" width="8" height="40"
        fill="rgba(11,13,11,0.06)" stroke="#52534e" stroke-width="0.8"/>

  <!-- ============================== -->
  <!-- MESSAGE LABELS (with mask rects) -->
  <!-- ============================== -->

  <!-- 1. POST /mcp/ tools/call -->
  <rect x="200" y="144" width="160" height="12" rx="2" fill="#f5f4ed"/>
  <text x="280" y="154" fill="#1a70c7" font-size="8"
        font-family="ui-monospace, monospace" text-anchor="middle"
        letter-spacing="0.7">POST /mcp/ — NO BEARER</text>

  <!-- 2. 401 WWW-Authenticate -->
  <rect x="196" y="192" width="172" height="12" rx="2" fill="#f5f4ed"/>
  <text x="282" y="202" fill="#1a70c7" font-size="8"
        font-family="ui-monospace, monospace" text-anchor="middle"
        letter-spacing="0.7">401 + WWW-AUTHENTICATE</text>

  <!-- 3. GET /.well-known/... -->
  <rect x="320" y="240" width="180" height="12" rx="2" fill="#f5f4ed"/>
  <text x="410" y="250" fill="#1a70c7" font-size="8"
        font-family="ui-monospace, monospace" text-anchor="middle"
        letter-spacing="0.7">GET /.well-known/oauth-prm</text>

  <!-- 4. resource metadata -->
  <rect x="320" y="280" width="180" height="12" rx="2" fill="#f5f4ed"/>
  <text x="410" y="290" fill="#1a70c7" font-size="8"
        font-family="ui-monospace, monospace" text-anchor="middle"
        letter-spacing="0.7">{ authorization_servers }</text>

  <!-- 5. OAuth 2.1 flow (focal) -->
  <rect x="420" y="328" width="240" height="12" rx="2" fill="#f5f4ed"/>
  <text x="540" y="338" fill="#f7591f" font-size="8"
        font-family="ui-monospace, monospace" text-anchor="middle"
        letter-spacing="0.7">OAUTH 2.1 — DCR + PKCE + AUTH CODE</text>

  <!-- 6. access_token (focal return) -->
  <rect x="460" y="368" width="160" height="12" rx="2" fill="#f5f4ed"/>
  <text x="540" y="378" fill="#f7591f" font-size="8"
        font-family="ui-monospace, monospace" text-anchor="middle"
        letter-spacing="0.7">ACCESS_TOKEN</text>

  <!-- 7. POST /mcp/ with Bearer -->
  <rect x="196" y="416" width="172" height="12" rx="2" fill="#f5f4ed"/>
  <text x="282" y="426" fill="#1a70c7" font-size="8"
        font-family="ui-monospace, monospace" text-anchor="middle"
        letter-spacing="0.7">POST /mcp/ — BEARER TOKEN</text>

  <!-- 8. 200 result -->
  <rect x="232" y="456" width="96" height="12" rx="2" fill="#f5f4ed"/>
  <text x="280" y="466" fill="#1a70c7" font-size="8"
        font-family="ui-monospace, monospace" text-anchor="middle"
        letter-spacing="0.7">HTTP 200 RESULT</text>

  <!-- ============================== -->
  <!-- ANNOTATION (discovery hint)     -->
  <!-- ============================== -->
  <!-- callout line from msg 2 to note -->
  <line x1="376" y1="216" x2="376" y2="232"
        stroke="rgba(11,13,11,0.30)" stroke-width="0.8" stroke-dasharray="2,2"/>
  <rect x="40" y="224" width="220" height="20" rx="3"
        fill="#f5f4ed" stroke="rgba(11,13,11,0.20)" stroke-width="0.8"/>
  <text x="50" y="237" fill="#52534e" font-size="9"
        font-family="ui-monospace, monospace">resource_metadata = discovery hint</text>

  <!-- ============================== -->
  <!-- LIFELINE HEADERS (boxes at top) -->
  <!-- ============================== -->

  <!-- C: MCP Client (External) -->
  <rect x="60" y="60" width="160" height="60" rx="6" fill="#f5f4ed"/>
  <rect x="60" y="60" width="160" height="60" rx="6"
        fill="rgba(82,83,78,0.10)" stroke="#65655c" stroke-width="1"/>
  <rect x="68" y="68" width="32" height="12" rx="2" fill="transparent"
        stroke="rgba(101,101,92,0.40)" stroke-width="0.8"/>
  <text x="84" y="77" fill="#65655c" font-size="7"
        font-family="ui-monospace, monospace" text-anchor="middle"
        letter-spacing="0.7">EXT</text>
  <text x="140" y="100" fill="#0b0d0b" font-size="12" font-weight="600"
        text-anchor="middle">MCP Client</text>
  <text x="140" y="114" fill="#52534e" font-size="9"
        font-family="ui-monospace, monospace" text-anchor="middle">any MCP client</text>

  <!-- G: Gateway /mcp/ (HOST) -->
  <rect x="340" y="60" width="160" height="60" rx="6" fill="#f5f4ed"/>
  <rect x="340" y="60" width="160" height="60" rx="6"
        fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>
  <rect x="348" y="68" width="36" height="12" rx="2" fill="transparent"
        stroke="rgba(11,13,11,0.40)" stroke-width="0.8"/>
  <text x="366" y="77" fill="#0b0d0b" font-size="7"
        font-family="ui-monospace, monospace" text-anchor="middle"
        letter-spacing="0.7">HOST</text>
  <text x="420" y="100" fill="#0b0d0b" font-size="12" font-weight="600"
        text-anchor="middle">Gateway</text>
  <text x="420" y="114" fill="#52534e" font-size="9"
        font-family="ui-monospace, monospace" text-anchor="middle">/mcp/</text>

  <!-- W: Discovery (HOST) -->
  <rect x="600" y="60" width="160" height="60" rx="6" fill="#f5f4ed"/>
  <rect x="600" y="60" width="160" height="60" rx="6"
        fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>
  <rect x="608" y="68" width="36" height="12" rx="2" fill="transparent"
        stroke="rgba(11,13,11,0.40)" stroke-width="0.8"/>
  <text x="626" y="77" fill="#0b0d0b" font-size="7"
        font-family="ui-monospace, monospace" text-anchor="middle"
        letter-spacing="0.7">HOST</text>
  <text x="680" y="100" fill="#0b0d0b" font-size="12" font-weight="600"
        text-anchor="middle">Discovery</text>
  <text x="680" y="114" fill="#52534e" font-size="9"
        font-family="ui-monospace, monospace" text-anchor="middle">/.well-known/...</text>

  <!-- AS: Authorization Server (FOCAL coral) -->
  <rect x="860" y="60" width="160" height="60" rx="6" fill="#f5f4ed"/>
  <rect x="860" y="60" width="160" height="60" rx="6"
        fill="rgba(247,89,31,0.08)" stroke="#f7591f" stroke-width="1.2"/>
  <rect x="868" y="68" width="36" height="12" rx="2" fill="transparent"
        stroke="rgba(247,89,31,0.50)" stroke-width="0.8"/>
  <text x="886" y="77" fill="#f7591f" font-size="7"
        font-family="ui-monospace, monospace" text-anchor="middle"
        letter-spacing="0.7">EXT</text>
  <text x="940" y="100" fill="#0b0d0b" font-size="12" font-weight="600"
        text-anchor="middle">Auth Server</text>
  <text x="940" y="114" fill="#52534e" font-size="9"
        font-family="ui-monospace, monospace" text-anchor="middle">workos · auth0 · ...</text>

  <!-- ============================== -->
  <!-- LEGEND                           -->
  <!-- ============================== -->
  <line x1="40" y1="516" x2="1040" y2="516"
        stroke="rgba(11,13,11,0.10)" stroke-width="0.8"/>
  <text x="40" y="532" fill="#52534e" font-size="8"
        font-family="ui-monospace, monospace" letter-spacing="1.5">LEGEND</text>

  <rect x="40" y="548" width="14" height="10" rx="2"
        fill="rgba(247,89,31,0.08)" stroke="#f7591f" stroke-width="1"/>
  <text x="60" y="556" fill="#52534e" font-size="9">Auth server (focal)</text>

  <rect x="208" y="548" width="14" height="10" rx="2"
        fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>
  <text x="228" y="556" fill="#52534e" font-size="9">Host endpoint</text>

  <rect x="356" y="548" width="14" height="10" rx="2"
        fill="rgba(82,83,78,0.10)" stroke="#65655c" stroke-width="1"/>
  <text x="376" y="556" fill="#52534e" font-size="9">External</text>

  <line x1="468" y1="554" x2="496" y2="554"
        stroke="#1a70c7" stroke-width="1.4" marker-end="url(#arrow-link)"/>
  <text x="504" y="556" fill="#52534e" font-size="9">HTTP request</text>

  <line x1="612" y1="554" x2="640" y2="554"
        stroke="#1a70c7" stroke-width="1.2" stroke-dasharray="5,4"
        marker-end="url(#arrow-link)"/>
  <text x="648" y="556" fill="#52534e" font-size="9">HTTP response</text>

  <line x1="772" y1="554" x2="800" y2="554"
        stroke="#f7591f" stroke-width="1.6" marker-end="url(#arrow-accent)"/>
  <text x="808" y="556" fill="#52534e" font-size="9">OAuth flow (focal)</text>

  <line x1="952" y1="554" x2="980" y2="554"
        stroke="#52534e" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="988" y="556" fill="#52534e" font-size="9">Lifeline</text>
</svg>
