<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>convex-mcp-gateway · Architecture</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #f5f4ed;
      --color-ink:     #0b0d0b;
      --color-muted:   #52534e;
      --color-accent:  #f7591f;
      --color-link:    #1a70c7;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Instrument Serif', serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }

    .frame { max-width: 1240px; width: 100%; }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-family: var(--font-sans);
      font-size: 0.95rem;
      font-weight: 400;
      color: var(--color-muted);
      margin-bottom: 1.75rem;
      max-width: 56ch;
      line-height: 1.45;
    }

    svg { width: 100%; min-width: 1000px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Architecture · @convex-dev/mcp-gateway</p>
    <h1>How the gateway sits between an MCP client and your Convex functions</h1>
    <p class="subtitle">The component owns the protocol surface. You own the
      authorizer that gates every call. Both run inside one Convex deployment.</p>

    <svg viewBox="0 0 1080 540" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(11,13,11,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#52534e"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#f7591f"/>
        </marker>
        <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#1a70c7"/>
        </marker>
      </defs>

      <rect width="100%" height="100%" fill="#f5f4ed"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.55"/>

      <!-- Boundary: Convex deployment (broad outer dashed) -->
      <rect x="240" y="60" width="780" height="420" rx="8"
            fill="transparent" stroke="rgba(11,13,11,0.22)"
            stroke-width="1" stroke-dasharray="6,4"/>
      <rect x="252" y="48" width="156" height="20" rx="2" fill="#f5f4ed"/>
      <text x="260" y="62" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace"
            letter-spacing="0.14em">CONVEX DEPLOYMENT</text>

      <!-- Boundary: gateway component -->
      <rect x="260" y="160" width="440" height="300" rx="6"
            fill="transparent" stroke="rgba(11,13,11,0.18)"
            stroke-width="1" stroke-dasharray="4,3"/>
      <rect x="272" y="148" width="160" height="20" rx="2" fill="#f5f4ed"/>
      <text x="280" y="162" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace"
            letter-spacing="0.14em">MCP-GATEWAY COMPONENT</text>

      <!-- Boundary: host app (where the authorizer + tools live) -->
      <rect x="740" y="92" width="260" height="280" rx="6"
            fill="transparent" stroke="rgba(11,13,11,0.18)"
            stroke-width="1" stroke-dasharray="4,3"/>
      <rect x="752" y="80" width="92" height="20" rx="2" fill="#f5f4ed"/>
      <text x="760" y="94" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace"
            letter-spacing="0.14em">HOST APP</text>

      <!-- Arrows (drawn before boxes for correct z-order) -->
      <!-- Client to Gateway HTTP -->
      <line x1="200" y1="244" x2="280" y2="244"
            stroke="#1a70c7" stroke-width="1.4" marker-end="url(#arrow-link)"/>
      <!-- Gateway HTTP to dispatch -->
      <line x1="440" y1="244" x2="520" y2="244"
            stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- dispatch to Authorizer (FOCAL coral arrow) -->
      <line x1="680" y1="220" x2="760" y2="156"
            stroke="#f7591f" stroke-width="1.6" marker-end="url(#arrow-accent)"/>
      <!-- dispatch to Tool fn -->
      <line x1="680" y1="268" x2="760" y2="316"
            stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- dispatch to Audit (down) -->
      <line x1="600" y1="280" x2="600" y2="360"
            stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- Arrow labels (with paper masks) -->
      <rect x="208" y="224" width="64" height="12" rx="2" fill="#f5f4ed"/>
      <text x="240" y="234" fill="#1a70c7" font-size="8"
            font-family="'Geist Mono', monospace" text-anchor="middle"
            letter-spacing="0.08em">JSON-RPC</text>

      <rect x="448" y="224" width="64" height="12" rx="2" fill="#f5f4ed"/>
      <text x="480" y="234" fill="#52534e" font-size="8"
            font-family="'Geist Mono', monospace" text-anchor="middle"
            letter-spacing="0.08em">RUN ACTION</text>

      <rect x="676" y="172" width="64" height="12" rx="2" fill="#f5f4ed"/>
      <text x="708" y="182" fill="#f7591f" font-size="8"
            font-family="'Geist Mono', monospace" text-anchor="middle"
            letter-spacing="0.08em">POLICY</text>

      <rect x="676" y="280" width="80" height="12" rx="2" fill="#f5f4ed"/>
      <text x="716" y="290" fill="#52534e" font-size="8"
            font-family="'Geist Mono', monospace" text-anchor="middle"
            letter-spacing="0.08em">RUN HANDLE</text>

      <rect x="572" y="312" width="56" height="12" rx="2" fill="#f5f4ed"/>
      <text x="600" y="322" fill="#52534e" font-size="8"
            font-family="'Geist Mono', monospace" text-anchor="middle"
            letter-spacing="0.08em">WRITE</text>

      <!-- Node: MCP Client (external) -->
      <rect x="40" y="208" width="160" height="72" rx="6" fill="#f5f4ed"/>
      <rect x="40" y="208" width="160" height="72" rx="6"
            fill="rgba(82,83,78,0.10)" stroke="#65655c" stroke-width="1"/>
      <rect x="48" y="216" width="32" height="12" rx="2" fill="transparent"
            stroke="rgba(101,101,92,0.40)" stroke-width="0.8"/>
      <text x="64" y="225" fill="#65655c" font-size="7"
            font-family="'Geist Mono', monospace" text-anchor="middle"
            letter-spacing="0.08em">EXT</text>
      <text x="120" y="248" fill="#0b0d0b" font-size="12" font-weight="600"
            font-family="'Geist', sans-serif" text-anchor="middle">MCP Client</text>
      <text x="120" y="264" fill="#52534e" font-size="9"
            font-family="'Geist Mono', monospace" text-anchor="middle">Claude · Cursor · Inspector</text>

      <!-- Node: Gateway HTTP route -->
      <rect x="280" y="208" width="160" height="72" rx="6" fill="#f5f4ed"/>
      <rect x="280" y="208" width="160" height="72" rx="6"
            fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>
      <rect x="288" y="216" width="32" height="12" rx="2" fill="transparent"
            stroke="rgba(11,13,11,0.40)" stroke-width="0.8"/>
      <text x="304" y="225" fill="#0b0d0b" font-size="7"
            font-family="'Geist Mono', monospace" text-anchor="middle"
            letter-spacing="0.08em">HTTP</text>
      <text x="360" y="248" fill="#0b0d0b" font-size="12" font-weight="600"
            font-family="'Geist', sans-serif" text-anchor="middle">/mcp/ route</text>
      <text x="360" y="264" fill="#52534e" font-size="9"
            font-family="'Geist Mono', monospace" text-anchor="middle">JSON-RPC + Bearer</text>

      <!-- Node: dispatch -->
      <rect x="520" y="208" width="160" height="72" rx="6" fill="#f5f4ed"/>
      <rect x="520" y="208" width="160" height="72" rx="6"
            fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>
      <rect x="528" y="216" width="36" height="12" rx="2" fill="transparent"
            stroke="rgba(11,13,11,0.40)" stroke-width="0.8"/>
      <text x="546" y="225" fill="#0b0d0b" font-size="7"
            font-family="'Geist Mono', monospace" text-anchor="middle"
            letter-spacing="0.08em">CORE</text>
      <text x="600" y="248" fill="#0b0d0b" font-size="12" font-weight="600"
            font-family="'Geist', sans-serif" text-anchor="middle">dispatch</text>
      <text x="600" y="264" fill="#52534e" font-size="9"
            font-family="'Geist Mono', monospace" text-anchor="middle">callTool · listVisibleTools</text>

      <!-- Node: Authorizer (FOCAL coral) -->
      <rect x="760" y="120" width="200" height="72" rx="6" fill="#f5f4ed"/>
      <rect x="760" y="120" width="200" height="72" rx="6"
            fill="rgba(247,89,31,0.08)" stroke="#f7591f" stroke-width="1.2"/>
      <rect x="768" y="128" width="48" height="12" rx="2" fill="transparent"
            stroke="rgba(247,89,31,0.50)" stroke-width="0.8"/>
      <text x="792" y="137" fill="#f7591f" font-size="7"
            font-family="'Geist Mono', monospace" text-anchor="middle"
            letter-spacing="0.08em">YOUR CODE</text>
      <text x="860" y="160" fill="#0b0d0b" font-size="12" font-weight="600"
            font-family="'Geist', sans-serif" text-anchor="middle">authorize</text>
      <text x="860" y="176" fill="#52534e" font-size="9"
            font-family="'Geist Mono', monospace" text-anchor="middle">internalQuery · per call</text>

      <!-- Node: Tool functions -->
      <rect x="760" y="280" width="200" height="72" rx="6" fill="#f5f4ed"/>
      <rect x="760" y="280" width="200" height="72" rx="6"
            fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>
      <rect x="768" y="288" width="48" height="12" rx="2" fill="transparent"
            stroke="rgba(11,13,11,0.40)" stroke-width="0.8"/>
      <text x="792" y="297" fill="#0b0d0b" font-size="7"
            font-family="'Geist Mono', monospace" text-anchor="middle"
            letter-spacing="0.08em">YOUR CODE</text>
      <text x="860" y="320" fill="#0b0d0b" font-size="12" font-weight="600"
            font-family="'Geist', sans-serif" text-anchor="middle">tool functions</text>
      <text x="860" y="336" fill="#52534e" font-size="9"
            font-family="'Geist Mono', monospace" text-anchor="middle">query · mutation · action</text>

      <!-- Node: Audit log (store) -->
      <rect x="520" y="360" width="160" height="72" rx="6" fill="#f5f4ed"/>
      <rect x="520" y="360" width="160" height="72" rx="6"
            fill="rgba(11,13,11,0.05)" stroke="#52534e" stroke-width="1"/>
      <rect x="528" y="368" width="44" height="12" rx="2" fill="transparent"
            stroke="rgba(82,83,78,0.50)" stroke-width="0.8"/>
      <text x="550" y="377" fill="#52534e" font-size="7"
            font-family="'Geist Mono', monospace" text-anchor="middle"
            letter-spacing="0.08em">STORE</text>
      <text x="600" y="400" fill="#0b0d0b" font-size="12" font-weight="600"
            font-family="'Geist', sans-serif" text-anchor="middle">audit log</text>
      <text x="600" y="416" fill="#52534e" font-size="9"
            font-family="'Geist Mono', monospace" text-anchor="middle">outcome · identity · args</text>

      <!-- Legend strip -->
      <line x1="40" y1="468" x2="1040" y2="468"
            stroke="rgba(11,13,11,0.10)" stroke-width="0.8"/>
      <text x="40" y="484" fill="#52534e" font-size="8"
            font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>

      <rect x="40" y="500" width="14" height="10" rx="2"
            fill="rgba(247,89,31,0.08)" stroke="#f7591f" stroke-width="1"/>
      <text x="60" y="508" fill="#52534e" font-size="8.5"
            font-family="'Geist', sans-serif">Your authorizer (focal)</text>

      <rect x="220" y="500" width="14" height="10" rx="2"
            fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>
      <text x="240" y="508" fill="#52534e" font-size="8.5"
            font-family="'Geist', sans-serif">Component / host code</text>

      <rect x="400" y="500" width="14" height="10" rx="2"
            fill="rgba(11,13,11,0.05)" stroke="#52534e" stroke-width="1"/>
      <text x="420" y="508" fill="#52534e" font-size="8.5"
            font-family="'Geist', sans-serif">Persistent store</text>

      <rect x="540" y="500" width="14" height="10" rx="2"
            fill="rgba(82,83,78,0.10)" stroke="#65655c" stroke-width="1"/>
      <text x="560" y="508" fill="#52534e" font-size="8.5"
            font-family="'Geist', sans-serif">External</text>

      <line x1="640" y1="506" x2="668" y2="506"
            stroke="#1a70c7" stroke-width="1.4" marker-end="url(#arrow-link)"/>
      <text x="676" y="508" fill="#52534e" font-size="8.5"
            font-family="'Geist', sans-serif">HTTP request</text>

      <line x1="780" y1="506" x2="808" y2="506"
            stroke="#f7591f" stroke-width="1.6" marker-end="url(#arrow-accent)"/>
      <text x="816" y="508" fill="#52534e" font-size="8.5"
            font-family="'Geist', sans-serif">Policy decision</text>

      <line x1="920" y1="506" x2="948" y2="506"
            stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>
      <text x="956" y="508" fill="#52534e" font-size="8.5"
            font-family="'Geist', sans-serif">Internal call</text>
    </svg>
  </div>
</body>
</html>
