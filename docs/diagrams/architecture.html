<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>convex-mcp-gateway · Architecture</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #f5f4ed;
      --color-ink:     #0b0d0b;
      --color-muted:   #52534e;
      --color-accent:  #f7591f;
      --color-link:    #1a70c7;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Instrument Serif', serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }

    .frame { max-width: 1240px; width: 100%; }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-family: var(--font-sans);
      font-size: 0.95rem;
      font-weight: 400;
      color: var(--color-muted);
      margin-bottom: 1.75rem;
      max-width: 56ch;
      line-height: 1.45;
    }

    svg { width: 100%; min-width: 1000px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Architecture · @convex-dev/mcp-gateway</p>
    <h1>How the gateway sits between an MCP client and your Convex functions</h1>
    <p class="subtitle">Your host owns the HTTP route and the authorize callback,
      because Convex only exposes ctx.auth inside host code. The component owns
      the registry, dispatch, and audit log.</p>

    <svg viewBox="0 0 1080 560" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(11,13,11,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#52534e"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#f7591f"/>
        </marker>
        <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#1a70c7"/>
        </marker>
      </defs>

      <rect width="100%" height="100%" fill="#f5f4ed"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.55"/>

      <!-- Boundary: Convex deployment -->
      <rect x="240" y="60" width="800" height="420" rx="8"
            fill="transparent" stroke="rgba(11,13,11,0.22)"
            stroke-width="1" stroke-dasharray="6,4"/>
      <rect x="252" y="48" width="156" height="20" rx="2" fill="#f5f4ed"/>
      <text x="260" y="62" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace"
            letter-spacing="0.14em">CONVEX DEPLOYMENT</text>

      <!-- Boundary: gateway component (just dispatch + audit live here) -->
      <rect x="540" y="200" width="240" height="252" rx="6"
            fill="transparent" stroke="rgba(11,13,11,0.18)"
            stroke-width="1" stroke-dasharray="4,3"/>
      <rect x="552" y="188" width="180" height="20" rx="2" fill="#f5f4ed"/>
      <text x="560" y="202" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace"
            letter-spacing="0.14em">MCP-GATEWAY COMPONENT</text>

      <!-- Arrows (drawn before boxes for correct z-order) -->
      <line x1="200" y1="268" x2="280" y2="268"
            stroke="#1a70c7" stroke-width="1.4" marker-end="url(#arrow-link)"/>
      <line x1="416" y1="232" x2="476" y2="184"
            stroke="#f7591f" stroke-width="1.6" marker-end="url(#arrow-accent)"/>
      <line x1="480" y1="268" x2="560" y2="268"
            stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>
      <line x1="760" y1="268" x2="820" y2="268"
            stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>
      <line x1="660" y1="304" x2="660" y2="360"
            stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- Arrow labels (with paper masks) -->
      <rect x="208" y="248" width="64" height="12" rx="2" fill="#f5f4ed"/>
      <text x="240" y="258" fill="#1a70c7" font-size="8"
            font-family="'Geist Mono', monospace" text-anchor="middle"
            letter-spacing="0.08em">HTTP + JWT</text>

      <rect x="412" y="200" width="64" height="12" rx="2" fill="#f5f4ed"/>
      <text x="444" y="210" fill="#f7591f" font-size="8"
            font-family="'Geist Mono', monospace" text-anchor="middle"
            letter-spacing="0.08em">AUTHORIZE</text>

      <rect x="488" y="248" width="64" height="12" rx="2" fill="#f5f4ed"/>
      <text x="520" y="258" fill="#52534e" font-size="8"
            font-family="'Geist Mono', monospace" text-anchor="middle"
            letter-spacing="0.08em">RUN TOOL</text>

      <rect x="768" y="248" width="64" height="12" rx="2" fill="#f5f4ed"/>
      <text x="800" y="258" fill="#52534e" font-size="8"
            font-family="'Geist Mono', monospace" text-anchor="middle"
            letter-spacing="0.08em">RUN HANDLE</text>

      <rect x="632" y="320" width="56" height="12" rx="2" fill="#f5f4ed"/>
      <text x="660" y="330" fill="#52534e" font-size="8"
            font-family="'Geist Mono', monospace" text-anchor="middle"
            letter-spacing="0.08em">WRITE</text>

      <!-- Node: MCP Client (External) -->
      <rect x="40" y="232" width="160" height="72" rx="6" fill="#f5f4ed"/>
      <rect x="40" y="232" width="160" height="72" rx="6"
            fill="rgba(82,83,78,0.10)" stroke="#65655c" stroke-width="1"/>
      <rect x="48" y="240" width="32" height="12" rx="2" fill="transparent"

      <text x="64" y="249" fill="#65655c" font-size="7"

      <text x="120" y="272" fill="#0b0d0b" font-size="12" font-weight="600"

      <text x="120" y="288" fill="#52534e" font-size="9"

      <!-- Node: /mcp/ httpAction (HOST) -->
      <rect x="280" y="232" width="200" height="72" rx="6" fill="#f5f4ed"/>
      <rect x="280" y="232" width="200" height="72" rx="6"

      <rect x="288" y="240" width="36" height="12" rx="2" fill="transparent"

      <text x="306" y="249" fill="#0b0d0b" font-size="7"
            font-family="'Geist Mono', monospace" text-anchor="middle"
            letter-spacing="0.08em">HOST</text>
      <text x="380" y="272" fill="#0b0d0b" font-size="12" font-weight="600"

      <text x="380" y="288" fill="#52534e" font-size="9"
            font-family="'Geist Mono', monospace" text-anchor="middle">handleMcpRequest · session</text>

      <!-- Node: authorize callback (HOST, FOCAL) -->
      <rect x="476" y="108" width="200" height="72" rx="6" fill="#f5f4ed"/>
      <rect x="476" y="108" width="200" height="72" rx="6"

      <rect x="484" y="116" width="36" height="12" rx="2" fill="transparent"

      <text x="576" y="148" fill="#0b0d0b" font-size="12" font-weight="600"

      <text x="576" y="164" fill="#52534e" font-size="9"
            font-family="'Geist Mono', monospace" text-anchor="middle">JS · reads ctx.auth · per call</text>

      <!-- Node: dispatch (COMPONENT) -->
      <rect x="560" y="232" width="200" height="72" rx="6" fill="#f5f4ed"/>
      <rect x="560" y="232" width="200" height="72" rx="6"
            fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>
      <rect x="568" y="240" width="36" height="12" rx="2" fill="transparent"
            stroke="rgba(11,13,11,0.40)" stroke-width="0.8"/>
      <text x="586" y="249" fill="#0b0d0b" font-size="7"
            font-family="'Geist Mono', monospace" text-anchor="middle"
            letter-spacing="0.08em">CORE</text>
      <text x="660" y="272" fill="#0b0d0b" font-size="12" font-weight="600"
            font-family="'Geist', sans-serif" text-anchor="middle">dispatch.runTool</text>
      <text x="660" y="288" fill="#52534e" font-size="9"
            font-family="'Geist Mono', monospace" text-anchor="middle">registry · function handles</text>

      <!-- Node: tool functions (HOST) -->
      <rect x="820" y="232" width="200" height="72" rx="6" fill="#f5f4ed"/>
      <rect x="820" y="232" width="200" height="72" rx="6"
            fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>
      <rect x="828" y="240" width="36" height="12" rx="2" fill="transparent"
            stroke="rgba(11,13,11,0.40)" stroke-width="0.8"/>
      <text x="846" y="249" fill="#0b0d0b" font-size="7"
            font-family="'Geist Mono', monospace" text-anchor="middle"
            letter-spacing="0.08em">HOST</text>
      <text x="920" y="272" fill="#0b0d0b" font-size="12" font-weight="600"
            font-family="'Geist', sans-serif" text-anchor="middle">tool functions</text>
      <text x="920" y="288" fill="#52534e" font-size="9"
            font-family="'Geist Mono', monospace" text-anchor="middle">query · mutation · action</text>

      <!-- Node: audit log (COMPONENT STORE) -->
      <rect x="560" y="360" width="200" height="72" rx="6" fill="#f5f4ed"/>
      <rect x="560" y="360" width="200" height="72" rx="6"
            fill="rgba(11,13,11,0.05)" stroke="#52534e" stroke-width="1"/>
      <rect x="568" y="368" width="44" height="12" rx="2" fill="transparent"
            stroke="rgba(82,83,78,0.50)" stroke-width="0.8"/>
      <text x="590" y="377" fill="#52534e" font-size="7"
            font-family="'Geist Mono', monospace" text-anchor="middle"
            letter-spacing="0.08em">STORE</text>
      <text x="660" y="400" fill="#0b0d0b" font-size="12" font-weight="600"
            font-family="'Geist', sans-serif" text-anchor="middle">audit log</text>
      <text x="660" y="416" fill="#52534e" font-size="9"
            font-family="'Geist Mono', monospace" text-anchor="middle">outcome · identity · args</text>

      <!-- Legend strip -->
      <line x1="40" y1="492" x2="1040" y2="492"
            stroke="rgba(11,13,11,0.10)" stroke-width="0.8"/>
      <text x="40" y="508" fill="#52534e" font-size="8"
            font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>

      <rect x="40" y="524" width="14" height="10" rx="2"
            fill="rgba(247,89,31,0.08)" stroke="#f7591f" stroke-width="1"/>
      <text x="60" y="532" fill="#52534e" font-size="8.5"
            font-family="'Geist', sans-serif">Your authorize callback (focal)</text>

      <rect x="248" y="524" width="14" height="10" rx="2"
            fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>
      <text x="268" y="532" fill="#52534e" font-size="8.5"
            font-family="'Geist', sans-serif">Host code · component code</text>

      <rect x="448" y="524" width="14" height="10" rx="2"
            fill="rgba(11,13,11,0.05)" stroke="#52534e" stroke-width="1"/>
      <text x="468" y="532" fill="#52534e" font-size="8.5"
            font-family="'Geist', sans-serif">Persistent store</text>

      <rect x="588" y="524" width="14" height="10" rx="2"
            fill="rgba(82,83,78,0.10)" stroke="#65655c" stroke-width="1"/>
      <text x="608" y="532" fill="#52534e" font-size="8.5"
            font-family="'Geist', sans-serif">External</text>

      <line x1="676" y1="530" x2="704" y2="530"
            stroke="#1a70c7" stroke-width="1.4" marker-end="url(#arrow-link)"/>
      <text x="712" y="532" fill="#52534e" font-size="8.5"
            font-family="'Geist', sans-serif">HTTP request</text>

      <line x1="816" y1="530" x2="844" y2="530"
            stroke="#f7591f" stroke-width="1.6" marker-end="url(#arrow-accent)"/>
      <text x="852" y="532" fill="#52534e" font-size="8.5"
            font-family="'Geist', sans-serif">Policy decision</text>

      <line x1="956" y1="530" x2="984" y2="530"
            stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>
      <text x="992" y="532" fill="#52534e" font-size="8.5"
            font-family="'Geist', sans-serif">Internal</text>
    </svg>
  </div>
</body>
</html>
